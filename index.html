<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>mac.hm</title>
<style>

  html, body { height: 100%; margin: 0; }

.contact {
  font-family: "Burbank Big Black", Inter, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-weight: 900;
  font-size: 16px;           
  color: #cfcfcf;
  text-align: center;
  margin-top: 8px;
  letter-spacing: 0.6px;
}
.contact a {
  color: #ffffff;
  text-decoration: underline;
  text-decoration-thickness: 1px;
}

  body::before {
    content: "";
    position: fixed;
    inset: -12px -12px -12px -12px;
    z-index: -1;
    pointer-events: none;
    background:
      linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
      url('https://raw.githubusercontent.com/R-Pax/mac.hm/blob/main/arch.jpg') center/cover no-repeat;
    background-attachment: fixed;
    
    transform: translateZ(0);
    will-change: transform;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
    z-index: 1; 
    min-height: calc(100vh - 40px);
    box-sizing: border-box;
  }

  header { display:flex; align-items:center; gap:16px; }
  footer { margin-top:36px; color:#ccc; font-size:14px; text-align:center; }
  .socials{display:flex;gap:12px;justify-content:center;align-items:center;margin-bottom:12px}
  @media (max-width:600px){
    body { padding: 20px 20px 0 20px; }
  }
</style>
</head>
<body>
  <div class="container">
    <header style="text-align:center; margin-bottom:24px;">
      <img id="mainLogo" src="https://raw.githubusercontent.com/R-Pax/mac.hm/main/pax_blob.png" alt="logo" style="max-width:800px;width:70%;height:auto;display:block;margin:0 auto;" />
    </header>
    <footer>
      <div style="color:#ccc;font-size:15px;">contact: <a href="mailto:pax@mac.hm" style="color:#fff;text-decoration:underline;">pax@mac.hm</a></div>
    </footer>
  </div>
</body>
</html>
